<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Login Page</title>

  <script src="https://accounts.google.com/gsi/client" async defer></script>

  <style>
    body {
      background: #111;
      color: white;
      font-family: Arial;
      text-align: center;
      margin-top: 100px;
    }

    #welcome {
      display: none;
      font-size: 30px;
    }

    #loginBox {
      display: block;
    }
  </style>
</head>

<body>

<div id="loginBox">
  <h1>Войдите в аккаунт</h1>

  <div id="g_id_onload"
       data-client_id="1092101383564-esh60orv9blj12fgbcutk754o25uo670.apps.googleusercontent.com"
       data-callback="handleLogin">
  </div>

  <div class="g_id_signin"></div>
</div>

<div id="welcome">
  <h1>Спасибо за вход</h1>
  <h2>Привет 👋</h2>
</div>

<script>
function handleLogin(response) {
    // пользователь вошёл
    document.getElementById("loginBox").style.display = "none";
    document.getElementById("welcome").style.display = "block";
}
</script>

</body>
</html>
