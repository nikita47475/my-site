<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Login</title>

  <script src="https://accounts.google.com/gsi/client" async defer></script>

  <style>
    body {
      background: #111;
      color: white;
      font-family: Arial;
      text-align: center;
      margin-top: 120px;
    }

    #welcome {
      display: none;
      font-size: 32px;
    }

    #loginBox {
      display: block;
    }
  </style>
</head>

<body>

<div id="loginBox">
  <h1>Войдите в аккаунт</h1>

  <div id="g_id_onload"
       data-client_id="1092101383564-esh60orv9blj12fgbcutk754o25uo670.apps.googleusercontent.com"
       data-callback="onLogin">
  </div>

  <div class="g_id_signin"></div>
</div>

<div id="welcome">
  <h1 id="text">Привет 👋</h1>
</div>

<script>
function onLogin(response) {
    const payload = JSON.parse(atob(response.credential.split('.')[1]));

    // стабильное имя (без декодирования!)
    const name = payload.name || payload.given_name || payload.email;

    document.getElementById("loginBox").style.display = "none";
    document.getElementById("welcome").style.display = "block";

    document.getElementById("text").innerText = "Привет, " + name + " 👋";
}
</script>

</body>
</html>
